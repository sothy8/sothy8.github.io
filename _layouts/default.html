<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="particles" id="particles"></div>
  <svg class="network-lines" id="network-lines"></svg>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="profile">
        <img src="{{ '/assets/images/VST.jpg' | relative_url }}" alt="Sothy VANDETH" class="profile-img">
        <h2>{{ site.author }}</h2>
        <p class="title">Data Scientist & AI Engineer</p>
        <p class="affiliation">B.Eng. in Data Science<br>Institute of Technology of Cambodia</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Phnom Penh, Cambodia</p>
      </div>
      
      <div class="contact">
        <a href="mailto:{{ site.email }}" title="Email"><i class="fas fa-envelope"></i> Email</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" title="GitHub"><i class="fab fa-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i> LinkedIn</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <!-- Navigation -->
      <nav class="nav">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/education/' | relative_url }}" class="{% if page.url contains 'education' %}active{% endif %}">Education</a>
        <a href="{{ '/experience/' | relative_url }}" class="{% if page.url contains 'experience' %}active{% endif %}">Experience</a>
        <a href="{{ '/publications/' | relative_url }}" class="{% if page.url contains 'publications' %}active{% endif %}">Publications</a>
        <a href="{{ '/projects/' | relative_url }}" class="{% if page.url contains 'projects' %}active{% endif %}">Projects</a>
        <a href="{{ '/contact/' | relative_url }}" class="{% if page.url contains 'contact' %}active{% endif %}">Contact</a>
      </nav>

      <!-- Page Content -->
      <div class="main-content">
        {{ content }}
      </div>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. Built with <a href="https://jekyllrb.com/" target="_blank">Jekyll</a>.</p>
      </footer>
    </main>
  </div>

  <script>
    // Generate particles
    const particlesContainer = document.getElementById('particles');
    const particleCount = 50;

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 20 + 's';
      particle.style.animationDuration = (15 + Math.random() * 15) + 's';
      particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
      particle.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
      particlesContainer.appendChild(particle);
    }

    // Generate network lines
    const svg = document.getElementById('network-lines');
    const particles = Array.from(particlesContainer.querySelectorAll('.particle'));
    
    function updateLines() {
      svg.innerHTML = '';
      const lines = svg.createElementNS('http://www.w3.org/2000/svg', 'g');
      
      particles.forEach((particle, i) => {
        const rect1 = particle.getBoundingClientRect();
        const x1 = rect1.left + rect1.width / 2;
        const y1 = rect1.top + rect1.height / 2;
        
        // Connect to nearby particles
        particles.forEach((other, j) => {
          if (i < j) {
            const rect2 = other.getBoundingClientRect();
            const x2 = rect2.left + rect2.width / 2;
            const y2 = rect2.top + rect2.height / 2;
            
            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            
            if (distance < 300) {
              const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
              line.setAttribute('x1', x1);
              line.setAttribute('y1', y1);
              line.setAttribute('x2', x2);
              line.setAttribute('y2', y2);
              line.setAttribute('stroke', 'rgba(100, 150, 220, 0.6)');
              line.setAttribute('stroke-width', '2');
              lines.appendChild(line);
            }
          }
        });
      });
      
      svg.appendChild(lines);
    }

    // Update lines on animation frame
    setInterval(updateLines, 100);
    updateLines();
  </script>
</body>
</html>
