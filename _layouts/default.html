<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="particles" id="particles"></div>
  <svg class="network-lines" id="network-lines"></svg>

  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="profile">
        <img src="{{ '/assets/images/VST.jpg' | relative_url }}" alt="Sothy VANDETH" class="profile-img">
        <h2>{{ site.author }}</h2>
        <p class="title">Data Scientist & AI Engineer</p>
        <p class="affiliation">B.Eng. in Data Science<br>Institute of Technology of Cambodia</p>
        <p class="location"><i class="fas fa-map-marker-alt"></i> Phnom Penh, Cambodia</p>
      </div>
      
      <div class="contact">
        <a href="mailto:{{ site.email }}" title="Email"><i class="fas fa-envelope"></i> Email</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank" title="GitHub"><i class="fab fa-github"></i> GitHub</a>
        <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i> LinkedIn</a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <!-- Navigation -->
      <nav class="nav">
        <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">Home</a>
        <a href="{{ '/education/' | relative_url }}" class="{% if page.url contains 'education' %}active{% endif %}">Education</a>
        <a href="{{ '/experience/' | relative_url }}" class="{% if page.url contains 'experience' %}active{% endif %}">Experience</a>
        <a href="{{ '/publications/' | relative_url }}" class="{% if page.url contains 'publications' %}active{% endif %}">Publications</a>
        <a href="{{ '/projects/' | relative_url }}" class="{% if page.url contains 'projects' %}active{% endif %}">Projects</a>
        <a href="{{ '/contact/' | relative_url }}" class="{% if page.url contains 'contact' %}active{% endif %}">Contact</a>
      </nav>

      <!-- Page Content -->
      <div class="main-content">
        {{ content }}
      </div>

      <!-- Footer -->
      <footer class="footer">
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. Built with <a href="https://jekyllrb.com/" target="_blank">Jekyll</a>.</p>
      </footer>
    </main>
  </div>

  <script>
    // Generate particles with better distribution
    const particlesContainer = document.getElementById('particles');
    const particleCount = 60;
    const particleData = [];

    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      
      const x = Math.random() * 100;
      const y = Math.random() * 100;
      const tx = (Math.random() - 0.5) * 300;
      const ty = (Math.random() - 0.5) * 300;
      const duration = 20 + Math.random() * 20;
      const delay = Math.random() * 20;
      
      particle.style.left = x + '%';
      particle.style.top = y + '%';
      particle.style.animationDelay = delay + 's';
      particle.style.animationDuration = duration + 's';
      particle.style.setProperty('--tx', tx + 'px');
      particle.style.setProperty('--ty', ty + 'px');
      
      particlesContainer.appendChild(particle);
      particleData.push({ element: particle, x, y, tx, ty });
    }

    // Generate network lines with gradient effect
    const svg = document.getElementById('network-lines');
    const particles = Array.from(particlesContainer.querySelectorAll('.particle'));
    
    // Create gradient definition for lines
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
    gradient.setAttribute('id', 'lineGradient');
    gradient.setAttribute('x1', '0%');
    gradient.setAttribute('y1', '0%');
    gradient.setAttribute('x2', '100%');
    gradient.setAttribute('y2', '0%');
    
    const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    stop1.setAttribute('offset', '0%');
    stop1.setAttribute('style', 'stop-color:rgba(52, 152, 219, 0.8);stop-opacity:1');
    
    const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    stop2.setAttribute('offset', '50%');
    stop2.setAttribute('style', 'stop-color:rgba(41, 128, 185, 1);stop-opacity:1');
    
    const stop3 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    stop3.setAttribute('offset', '100%');
    stop3.setAttribute('style', 'stop-color:rgba(52, 152, 219, 0.8);stop-opacity:1');
    
    gradient.appendChild(stop1);
    gradient.appendChild(stop2);
    gradient.appendChild(stop3);
    defs.appendChild(gradient);
    svg.appendChild(defs);
    
    function updateLines() {
      // Remove old lines but keep defs
      const oldLines = svg.querySelector('g');
      if (oldLines) oldLines.remove();
      
      const lines = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      
      particles.forEach((particle, i) => {
        const rect1 = particle.getBoundingClientRect();
        const x1 = rect1.left + rect1.width / 2;
        const y1 = rect1.top + rect1.height / 2;
        
        // Connect to nearby particles
        particles.forEach((other, j) => {
          if (i < j) {
            const rect2 = other.getBoundingClientRect();
            const x2 = rect2.left + rect2.width / 2;
            const y2 = rect2.top + rect2.height / 2;
            
            const distance = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
            
            if (distance < 250) {
              const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
              line.setAttribute('x1', x1);
              line.setAttribute('y1', y1);
              line.setAttribute('x2', x2);
              line.setAttribute('y2', y2);
              
              // Calculate opacity based on distance
              const opacity = 1 - (distance / 250);
              line.setAttribute('stroke', `rgba(41, 128, 185, ${opacity * 0.7})`);
              line.setAttribute('stroke-width', '1.5');
              line.setAttribute('stroke-linecap', 'round');
              
              // Add glow effect with filter
              line.style.filter = 'drop-shadow(0 0 2px rgba(41, 128, 185, 0.6))';
              
              lines.appendChild(line);
            }
          }
        });
      });
      
      svg.appendChild(lines);
    }

    // Smooth animation loop
    let animationFrame;
    function animate() {
      updateLines();
      animationFrame = requestAnimationFrame(animate);
    }
    
    // Initial render
    updateLines();
    
    // Start smooth animation after a short delay
    setTimeout(() => {
      animate();
    }, 100);
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (animationFrame) cancelAnimationFrame(animationFrame);
    });
  </script>
</body>
</html>
